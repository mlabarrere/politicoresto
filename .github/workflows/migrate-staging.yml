name: Migrate — Staging DB (manual hotfix)

# Manual-only : les pushes sur main déclenchent la migration staging
# via deploy-preview.yml (job migrate-staging → deploy-preview séquentiel).
# Ce workflow sert uniquement aux hotfix DB-only qu'on ne veut pas coupler
# à un déploiement applicatif.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: migrate-staging
  cancel-in-progress: false

jobs:
  migrate-staging:
    name: supabase db push → staging
    runs-on: ubuntu-latest
    env:
      STAGING_PROJECT_REF: nvwpvckjsvicsyzpzjfi
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link staging project
        run: supabase link --project-ref "$STAGING_PROJECT_REF"
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

      - name: Push migrations
        run: supabase db push --include-all
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
