name: CI

# Runs on every PR targeting main, and on every push to main.
# On both: quality + coverage run in parallel → build waits for both.
# Deploy is handled by separate workflows (deploy-preview.yml, deploy-production.yml).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# ─────────────────────────────────────────
# JOB 1 — Code quality (TypeScript)
# ─────────────────────────────────────────
jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

# ─────────────────────────────────────────
# JOB 2 — Tests & coverage (Vitest + Codecov)
# ─────────────────────────────────────────
  coverage:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: ./node_modules/.bin/vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

# ─────────────────────────────────────────
# JOB 3 — Build (waits for quality + coverage)
# ─────────────────────────────────────────
  build:
    name: Build
    needs: [quality, coverage]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
