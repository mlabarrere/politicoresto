name: CI

# Runs on every PR targeting main, and on every push to main.
# Single source of truth: scripts/verify.sh (same script devs run locally).
#
# Cost-aware:
# - Skipped on doc-only changes (see paths-ignore below).
# - Skipped on draft PRs (see `if:` on jobs).
# - npm cache keyed on frontend/package-lock.json.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/skills/**'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/skills/**'
      - 'LICENSE'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Verify (lint + typecheck + tests)
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Parity: the exact same gate developers run locally.
      - name: scripts/verify.sh (prettier + eslint + auth-guards + typecheck + vitest)
        run: bash scripts/verify.sh

  coverage:
    name: Tests & Coverage
    if: github.event.pull_request.draft != true
    needs: [verify]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: ./node_modules/.bin/vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  build:
    name: Build
    if: github.event.pull_request.draft != true
    needs: [verify]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Build does not need real Supabase creds — our @t3-oss/env-nextjs
          # schema fails at import time on `createEnv` if the vars are
          # unset. Vercel Production/Preview build steps inject real values.
          SKIP_ENV_VALIDATION: 'true'
        run: npm run build
