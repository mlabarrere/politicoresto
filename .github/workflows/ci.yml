name: CI

# Runs on every PR targeting main, and on every push to main.
# Single source of truth: scripts/verify.sh (same script devs run locally).
#
# Cost-aware:
# - Skipped on doc-only changes (see paths-ignore below).
# - Skipped on draft PRs (see `if:` on jobs).
# - npm cache keyed on frontend/package-lock.json.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/skills/**'
      - 'LICENSE'
      # Worker-only PRs run `worker-ci.yml`; don't double up on the
      # frontend gate.
      - 'worker/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/skills/**'
      - 'LICENSE'
      - 'worker/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Verify (lint + typecheck + tests)
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Parity: the exact same gate developers run locally.
      - name: scripts/verify.sh (prettier + eslint + auth-guards + typecheck + vitest)
        run: bash scripts/verify.sh

  coverage:
    name: Tests & Coverage
    if: github.event.pull_request.draft != true
    needs: [verify]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: ./node_modules/.bin/vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  build:
    name: Build
    if: github.event.pull_request.draft != true
    needs: [verify]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Build does not need real Supabase creds — our @t3-oss/env-nextjs
          # schema fails at import time on `createEnv` if the vars are
          # unset. Vercel Production/Preview build steps inject real values.
          SKIP_ENV_VALIDATION: 'true'
        run: npm run build

  integration:
    name: Integration (Vitest + local Supabase)
    if: github.event.pull_request.draft != true
    needs: [verify]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI on PATH
        # tests/fixtures/supabase-admin.ts calls `supabase status -o env`
        # as a plain subprocess — the binary must be on PATH. Supabase
        # explicitly rejects `npm install -g supabase`; their official
        # GitHub Action is the supported path.
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        working-directory: ${{ github.workspace }}
        run: supabase start

      - name: Run integration tests
        run: npm run test:integration

      - name: Stop Supabase local stack
        if: always()
        working-directory: ${{ github.workspace }}
        run: supabase stop || true

  e2e:
    name: E2E (Playwright)
    if: github.event.pull_request.draft != true
    needs: [verify]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # E2E tests run against `next dev` on 127.0.0.1:3001, configured
      # by playwright.config.ts. We need a local Supabase stack to hit.
      # playwright.config.ts reads the service-role key via
      # `supabase status -o env` so the magic-link auth helper can run.
      SKIP_ENV_VALIDATION: 'true'
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Install Supabase CLI on PATH
        # playwright.config.ts calls `supabase status -o env` at config-load
        # time to populate NEXT_PUBLIC_SUPABASE_* + service-role for the
        # magic-link auth helper — the binary must be on PATH. Supabase's
        # official GitHub Action is the supported install path (global npm
        # install is explicitly blocked by their postinstall script).
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        working-directory: ${{ github.workspace }}
        run: supabase start

      - name: Run Playwright suite (desktop project only)
        run: npx playwright test --project=desktop

      - name: Upload Playwright trace artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: frontend/test-results/
          retention-days: 7

      - name: Stop Supabase local stack
        if: always()
        working-directory: ${{ github.workspace }}
        run: supabase stop || true
