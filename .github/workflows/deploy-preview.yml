name: Deploy — Preview (staging)

# Chaîne unique déclenchée après CI sur main :
#   1. migrate-staging : applique les migrations à la DB staging
#   2. deploy-preview  : build + déploie la preview Vercel (consomme staging)
#
# Deploy est bloqué si migrate échoue → pas de preview sur une DB stale.
# Jamais déclenché par une PR ; auto-deploys Vercel désactivés via vercel.json.
# Rejouable manuellement via workflow_dispatch.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-preview
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Applique les migrations sur staging (avant le deploy)
  # ────────────────────────────────────────────────────────────
  migrate-staging:
    name: supabase db push → staging
    runs-on: ubuntu-latest
    # Sur workflow_run on gate sur le succès du CI. Sur workflow_dispatch on laisse passer.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout (exact SHA that triggered CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link staging project
        run: supabase link --project-ref "$STAGING_PROJECT_REF"
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

      - name: Push migrations
        run: supabase db push --include-all
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

  # ────────────────────────────────────────────────────────────
  # 2. Deploy Vercel preview (gaté sur migrate OK)
  # ────────────────────────────────────────────────────────────
  deploy-preview:
    name: Vercel Preview
    needs: migrate-staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (exact SHA that triggered CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "deployment_url=${url#https://}" >> "$GITHUB_OUTPUT"
          echo "✅ Preview: $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Alias staging stable pour que Google OAuth ait une URL unique à whitelister.
      # Sans ça, l'URL Vercel change à chaque deploy → régression SSO (5x vue).
      - name: Alias deployment to politicoresto-staging.vercel.app
        run: |
          vercel alias set "${{ steps.deploy.outputs.deployment_url }}" politicoresto-staging.vercel.app --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
          echo "🔗 Staging alias: https://politicoresto-staging.vercel.app"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ────────────────────────────────────────────────────────────
  # 3. E2E auth sur staging (vraie Supabase, vrai cookie jar)
  # ────────────────────────────────────────────────────────────
  # Couvre les régressions silencieuses du cookie de session.
  # Skip gracieusement si les secrets E2E_* ne sont pas set (avant setup).
  e2e-auth-staging:
    name: E2E auth (staging)
    needs: deploy-preview
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      # Pour pouvoir tester la présence d'un secret dans un `if:` de step,
      # on le passe en env job. Pas de fuite de valeur — Actions masque.
      HAS_E2E_SECRETS: ${{ secrets.E2E_TEST_USER_PASSWORD != '' && 'yes' || '' }}

    steps:
      - name: Notice when skipped
        if: ${{ env.HAS_E2E_SECRETS == '' }}
        run: |
          echo "::notice::E2E staging tests skipped — secrets E2E_TEST_USER_EMAIL/PASSWORD/E2E_SUPABASE_PUBLISHABLE_KEY not set"
          echo "Once set, every deploy will auto-validate that the session cookie persists after login."

      - name: Checkout
        if: ${{ env.HAS_E2E_SECRETS == 'yes' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        if: ${{ env.HAS_E2E_SECRETS == 'yes' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install deps
        if: ${{ env.HAS_E2E_SECRETS == 'yes' }}
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        if: ${{ env.HAS_E2E_SECRETS == 'yes' }}
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # Pre-flight: vérifier que le staging n'est pas derrière Vercel
      # Deployment Protection (401). Si oui, l'E2E skip — inutile de faire
      # planter le pipeline tant que la protection n'est pas levée.
      # Cf. docs/STAGING_SETUP.md.
      - name: Check staging is publicly reachable
        if: ${{ env.HAS_E2E_SECRETS == 'yes' }}
        id: staging_check
        run: |
          status=$(curl -sI -o /dev/null -w "%{http_code}" https://politicoresto-staging.vercel.app/)
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" = "401" ] || [ "$status" = "403" ]; then
            echo "::warning::staging returned $status — Vercel Deployment Protection is ON. See docs/STAGING_SETUP.md."
            echo "reachable=no" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=yes" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E auth
        if: ${{ env.HAS_E2E_SECRETS == 'yes' && steps.staging_check.outputs.reachable == 'yes' }}
        working-directory: frontend
        env:
          E2E_BASE_URL: https://politicoresto-staging.vercel.app
          E2E_SUPABASE_URL: https://${{ secrets.SUPABASE_STAGING_PROJECT_REF }}.supabase.co
          E2E_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.E2E_SUPABASE_PUBLISHABLE_KEY }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
        run: npx playwright test --project=staging-auth

      - name: Upload traces on failure
        if: ${{ failure() && env.HAS_E2E_SECRETS == 'yes' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-staging-auth
          path: frontend/test-results/
          retention-days: 7
