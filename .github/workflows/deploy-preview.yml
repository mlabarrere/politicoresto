name: Deploy — Preview (staging)

# Chaîne unique déclenchée après CI sur main :
#   1. migrate-staging : applique les migrations à la DB staging
#   2. deploy-preview  : build + déploie la preview Vercel (consomme staging)
#
# Deploy est bloqué si migrate échoue → pas de preview sur une DB stale.
# Jamais déclenché par une PR ; auto-deploys Vercel désactivés via vercel.json.
# Rejouable manuellement via workflow_dispatch.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-preview
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Applique les migrations sur staging (avant le deploy)
  # ────────────────────────────────────────────────────────────
  migrate-staging:
    name: supabase db push → staging
    runs-on: ubuntu-latest
    # Sur workflow_run on gate sur le succès du CI. Sur workflow_dispatch on laisse passer.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      STAGING_PROJECT_REF: nvwpvckjsvicsyzpzjfi
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout (exact SHA that triggered CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link staging project
        run: supabase link --project-ref "$STAGING_PROJECT_REF"
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

      - name: Push migrations
        run: supabase db push --include-all
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

  # ────────────────────────────────────────────────────────────
  # 2. Deploy Vercel preview (gaté sur migrate OK)
  # ────────────────────────────────────────────────────────────
  deploy-preview:
    name: Vercel Preview
    needs: migrate-staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (exact SHA that triggered CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "deployment_url=${url#https://}" >> "$GITHUB_OUTPUT"
          echo "✅ Preview: $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Alias staging stable pour que Google OAuth ait une URL unique à whitelister.
      # Sans ça, l'URL Vercel change à chaque deploy → régression SSO (5x vue).
      - name: Alias deployment to politicoresto-staging.vercel.app
        run: |
          vercel alias set "${{ steps.deploy.outputs.deployment_url }}" politicoresto-staging.vercel.app --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
          echo "🔗 Staging alias: https://politicoresto-staging.vercel.app"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ────────────────────────────────────────────────────────────
  # 3. E2E auth sur staging (vraie Supabase, vrai cookie jar)
  # ────────────────────────────────────────────────────────────
  # Couvre les régressions silencieuses du cookie de session après login.
  # Skip si les secrets E2E ne sont pas là (ex: premier run avant setup).
  e2e-auth-staging:
    name: E2E auth (staging)
    needs: deploy-preview
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E auth
        working-directory: frontend
        env:
          E2E_BASE_URL: https://politicoresto-staging.vercel.app
          E2E_SUPABASE_URL: https://nvwpvckjsvicsyzpzjfi.supabase.co
          E2E_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.E2E_SUPABASE_PUBLISHABLE_KEY }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
        run: npx playwright test --project=staging-auth

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-staging-auth
          path: frontend/test-results/
          retention-days: 7
