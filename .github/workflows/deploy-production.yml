name: Deploy — Production

# Triggered only when a GitHub Release is published.
# This is the single gate for production traffic.
# Runs migrations first, then deploys. If migration fails, deploy is blocked.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  migrate:
    name: supabase db push → production
    runs-on: ubuntu-latest
    env:
      PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$PROD_PROJECT_REF"
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}

      - name: Push migrations (idempotent)
        run: supabase db push --include-all
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}

  deploy-production:
    name: Vercel Production
    needs: migrate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Gate: run tests before promoting to production
      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build & type-check
        # Pre-deploy gate to catch tsc/build errors before touching Vercel.
        # Real Supabase creds aren't available in GitHub Actions — Vercel
        # injects them at the `vercel build --prod` step below. Skip the
        # @t3-oss/env-nextjs runtime check here; it still runs at deploy
        # time when the real values are present.
        env:
          SKIP_ENV_VALIDATION: 'true'
        run: npm run build
        working-directory: frontend

      - name: Run unit tests
        run: ./node_modules/.bin/vitest run
        working-directory: frontend

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "🚀 Production: $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
