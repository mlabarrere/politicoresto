# Railway service config — weighting worker.
# https://docs.railway.com/reference/config-as-code

[build]
builder = "RAILPACK"
# Railpack will auto-detect Python + uv from pyproject.toml / uv.lock.

[deploy]
# Bind to Railway's injected $PORT.
startCommand = "uv run uvicorn weighting.http_app:app --host 0.0.0.0 --port $PORT --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
