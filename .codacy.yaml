version: "1.0"

tools:
  eslint:
    enabled: true
  pmd:
    enabled: false
  pmd-legacy:
    enabled: false
  # sonarjs ne comprend pas les TSX React (flag faussement className, htmlFor
  # comme "attributs spécifiques à React"). On s'appuie sur eslint-plugin-react
  # pour la vraie vérification React.
  sonar-typescript:
    enabled: false
  sonar-javascript:
    enabled: false

exclude_paths:
  - "node_modules/**"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.next/**"
  - "frontend/coverage/**"
  # Prose / rules documentation. Codacy's AI prose lints flag our intentional
  # style (absolute rules, SQL keyword acronyms, migration timestamp digits
  # misread as phone numbers). Documentation is reviewed by humans, not a
  # prose-style linter. Globs are enumerated explicitly to match both root
  # and nested .md files across every tool Codacy runs.
  - "*.md"
  - "**/*.md"
  - "CLAUDE.md"
  - "README.md"
  - ".claude/**"
  - ".claude/**/*"
  - "docs/**"
  - "docs/**/*"
  - "supabase/docs/**"
  # Baseline migration is a pg_dump of pre-existing staging schema, not
  # hand-written code — style and complexity checks are noise on a dump.
  - "supabase/migrations/20260402193700_remote_baseline.sql"
